# Configuración del Ingestor Local
# workflow-assistant PDF Ingestor v1

watch:
  folder: "~/Downloads/polizas"      # Subcarpeta dedicada (evita basurero)
  recursive: false                    # No mira subcarpetas
  pattern: "*.pdf"                    # Solo PDFs

endpoint:
  url: "https://tu-dominio.com/api/ingesta-local"
  token: "${SANCTUM_TOKEN}"           # Leer de variable de entorno
  timeout: 60
  max_retries: 3

parser:
  # Compañías soportadas con sus anclas de parseo
  # Se pueden agregar más sin tocar código
  companies:
    - name: "Sancor Seguros"
      aliases: ["Sancor", "Sancor Seguros SA"]
      anchors:
        policy_number: ["Póliza Nº", "Póliza N°", "Número de Póliza"]
        holder_name: ["Tomador", "Asegurado", "Contratante"]
        holder_doc: ["CUIT", "C.U.I.T.", "Documento"]
        vehicle_plate: ["Dominio", "Patente", "Matrícula"]
        vehicle_brand: ["Marca", "Marca del vehículo"]
        vehicle_model: ["Modelo", "Modelo del vehículo"]
        emission_date: ["Fecha de emisión", "Emisión"]
        expiry_date: ["Vigencia hasta", "Vencimiento", "Vigencia"]
      date_format: "%d/%m/%Y"

    - name: "La Caja"
      aliases: ["La Caja Seguros", "La Caja Aseguradora"]
      anchors:
        policy_number: ["Póliza", "Nro. Póliza"]
        holder_name: ["Tomador"]
        holder_doc: ["C.U.I.T.", "CUIT"]
        vehicle_plate: ["Dominio"]
        vehicle_brand: ["Marca"]
        vehicle_model: ["Modelo"]
        emission_date: ["Fecha Emisión"]
        expiry_date: ["Vigencia Hasta"]
      date_format: "%d/%m/%Y"

output:
  state_file: "state.json"
  log_folder: "logs"
  log_level: "INFO"

# Reglas de negocio
rules:
  min_confidence_for_auto: 0.0       # 0 = todo va a Pendientes (modo confirmación)
  skip_scanned_pdfs: true            # Si no tiene capa de texto, subir crudo igual
  keep_processed_for_days: 30        # Cuánto tiempo guardar registro en state.json
